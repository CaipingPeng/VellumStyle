# 微信公众号排版工具 — 配置文件示例
#
# 用法：复制本文件为 config.local.yaml 并填入真实凭证。
# config.local.yaml 已在 .gitignore 中，不会被提交。
# 桌面端会优先读取 config.local.yaml，回退到 config.yaml。
#
# 注意：填入真实凭证后即可使用图床（上传按钮 / 粘贴图片）。留空时上传会提示去配置。

server:
  port: 8787

wechat:
  # 微信公众号 AppID / AppSecret（用于官方图床 add_material 接口，单图≤10MB）
  # 填入后桌面端即可用于上传；留空时前端上传会提示「尚未配置」
  appId: ""
  appSecret: ""

