name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Read release notes
        id: release_notes
        shell: pwsh
        run: |
          $notesPath = "release-notes.md"
          if (-not (Test-Path $notesPath)) {
            throw "Missing release notes file: $notesPath"
          }

          $notes = (Get-Content -Raw -Path $notesPath).Trim()
          if ([string]::IsNullOrWhiteSpace($notes)) {
            throw "release-notes.md is empty"
          }
          if ($notes -match "vX\.X\.X|X\.X\.X|TODO|待补充") {
            throw "release-notes.md still contains placeholder content"
          }

          $delimiter = "RELEASE_NOTES_$([guid]::NewGuid().ToString('N'))"
          "body<<$delimiter" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $notes | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $delimiter | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "VellumStyle v__VERSION__"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          tauriScript: npx tauri
